server {
    listen 80;
    listen [::]:80;
    
    server_name tiemhoanhato.site www.tiemhoanhato.site;
    
    # Logs
    access_log /var/log/nginx/flowerstore_access.log;
    error_log /var/log/nginx/flowerstore_error.log;
    
    # Client body size limit (for image uploads)
    client_max_body_size 20M;
    
    # Root location - redirect to /flowerstore
    location = / {
        return 301 http://\System.Management.Automation.Internal.Host.InternalHost/flowerstore/;
    }
    
    # Main application
    location /flowerstore/ {
        proxy_pass http://localhost:8080/flowerstore/;
        
        # Proxy headers
        proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Real-IP \;
        proxy_set_header X-Forwarded-For \;
        proxy_set_header X-Forwarded-Proto \;
        proxy_set_header X-Forwarded-Host \System.Management.Automation.Internal.Host.InternalHost;
        proxy_set_header X-Forwarded-Port \;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        proxy_pass http://localhost:8080;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control \
public
immutable\;
    }
}


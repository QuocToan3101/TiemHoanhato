# ==============================================
# FLOWER STORE APPLICATION CONFIGURATION
# ==============================================

# Database Configuration
db.url=jdbc:mysql://localhost:3306/flowerstore?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
db.username=root
db.password=
db.driver=com.mysql.cj.jdbc.Driver
db.pool.initialSize=5
db.pool.maxTotal=30
db.pool.maxIdle=10
db.pool.minIdle=3
db.pool.maxWaitMillis=10000

# Email Configuration (Gmail SMTP)
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.starttls.enable=true
email.smtp.starttls.required=true
email.username=YOUR_EMAIL_USERNAME
email.password=YOUR_EMAIL_APP_PASSWORD
email.from.name=Ti\u1ec7m Hoa nh\u00e0 t\u1edbi
email.from.address=YOUR_EMAIL_FROM_ADDRESS
email.admin.address=YOUR_EMAIL_ADMIN_ADDRESS

# Google OAuth Configuration
google.oauth.client.id=YOUR_GOOGLE_CLIENT_ID
google.oauth.client.secret=YOUR_GOOGLE_CLIENT_SECRET
google.oauth.redirect.uri=http://localhost:8080/flowerstore/oauth/google/callback

# VNPay Configuration
# Đăng ký tại: https://sandbox.vnpayment.vn/devreg/ (sandbox) hoặc https://vnpay.vn (production)
# Sau khi đăng ký, lấy TMN Code và Hash Secret từ merchant portal
vnpay.enabled=true
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return.url=http://localhost:8080/flowerstore/vnpay-return
vnpay.tmn.code=YOUR_VNPAY_TMN_CODE
vnpay.hash.secret=YOUR_VNPAY_HASH_SECRET
vnpay.version=2.1.0
vnpay.command=pay
vnpay.order.type=other

# MoMo Configuration
momo.enabled=true
momo.partner.code=YOUR_PARTNER_CODE
momo.access.key=YOUR_ACCESS_KEY
momo.secret.key=YOUR_SECRET_KEY
momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.return.url=http://localhost:8080/flowerstore/momo-return
momo.notify.url=http://localhost:8080/flowerstore/momo-notify
momo.request.type=captureWallet

# Application Settings
app.name=Flower Store
app.url=http://localhost:8080/flowerstore
app.upload.directory=/uploads

# Session Configuration
session.timeout=3600

# Security
password.reset.token.expiry=3600000

# Gemini AI Configuration (for AI Card Generation - FREE!)
# Hướng dẫn lấy API key: https://aistudio.google.com/app/apikey
# Lưu ý: Cần tạo API key mới nếu key này không hoạt động
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
gemini.model=gemini-pro
gemini.enabled=false
gemini.temperature=0.7
gemini.max.tokens=1000
